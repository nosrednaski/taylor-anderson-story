    <ellipse cx="0" cy="-7" rx="3.5" ry="5.5" fill="#c9a84c" opacity="0.95" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="5.5" fill="#c9a84c" opacity="0.95" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="5.5" fill="#c9a84c" opacity="0.95" transform="rotate(288)"/>
